display_name: Microsoft SQL Server Receiver
type: sqlserver

description: |
  The `sqlserver` receiver grabs metrics/logs about a Microsoft SQL Server instance. The receiver works by either using the
  Windows Performance Counters, or by directly connecting to the instance and querying it. Windows Performance Counters
  are only available when running on Windows.

reaggregation_enabled: true
override_value_enabled: true

status:
  class: receiver
  stability:
    beta: [metrics]
    development: [logs]
  distributions: [contrib]
  codeowners:
    active: [sincejune, crobert-1, sv-splunk]
    emeritus: [StefanKurek]
    seeking_new: true

resource_attributes:
  host.name:
    description: The host name of SQL Server
    enabled: true
    type: string
  server.address:
    description: Name of the database host.
    enabled: false
    type: string
  server.port:
    description: Server port number.
    enabled: false
    type: int
  service.instance.id:
    description: A unique identifier of the SQL Server instance in the format host:port. This resource attribute is only available when the receiver is configured to directly connect to SQL Server.
    enabled: true
    type: string
  service.name:
    description: "Logical name of the service. When enabled, defaults to unknown_service:microsoft.sql_server."
    enabled: false
    type: string
  service.namespace:
    description: Logical namespace for the service (for example team or environment). When enabled, defaults to an empty string until set via configuration.
    enabled: false
    type: string
  sqlserver.computer.name:
    description: The name of the SQL Server instance being monitored.
    enabled: false
    type: string
  sqlserver.database.name:
    description: The name of the SQL Server database.
    enabled: true
    type: string
  sqlserver.instance.name:
    description: The name of the SQL Server instance being monitored.
    enabled: false
    type: string

attributes:
  # attributes for metrics
  ag.cluster_type:
    description: Cluster type of the Always-On Availability Group.
    type: string
    requirement_level: recommended
    enum: [wsfc, external, none, unknown]
  ag.name:
    description: Name of the Always-On Availability Group.
    type: string
    requirement_level: recommended
  allocation.page_type:
    description: TempDB allocation-page wait type.
    type: string
    requirement_level: recommended
    enum: [gam, sgam, pfs, other]
  cache.state:
    description: The state of the cache objects.
    type: string
    requirement_level: recommended
    enum: [in_use, total]
  client.address:
    description: Hostname or address of the client.
    type: string
    requirement_level: recommended
  client.port:
    description: TCP port used by the client.
    type: int
    requirement_level: recommended
  database.status:
    description: The current status of a database
    type: string
    requirement_level: recommended
    enum: [online, restoring, recovering, pending_recovery, suspect, offline]
  db.namespace:
    description: The database name.
    type: string
    requirement_level: recommended
  db.query.comment_tags.nr_service_guid:
    description: New Relic service GUID extracted from the filtered query comments. Empty unless nr_service_guid is included in allowed_comment_keys configuration. Used for correlation with APM traces.
    type: string
    requirement_level: opt_in
  db.query.full_text:
    description: The full text of the SQL batch or stored procedure from which the statement was extracted. Only populated when collect_full_query_text is enabled.
    type: string
    requirement_level: opt_in
  db.query.text:
    description: The text of the database query being executed.
    type: string
    requirement_level: recommended
  db.query.text.normalized.hash:
    description: MD5 hash of the normalized full SQL query text. Used for correlation with APM slow query traces. Only populated when collect_full_query_text is enabled.
    type: string
    requirement_level: opt_in
  db.system.name:
    description: The database management system (DBMS) product as identified by the client instrumentation.
    type: string
    requirement_level: recommended
  ## query sample
  direction:
    description: The direction of flow of bytes or operations.
    type: string
    requirement_level: recommended
    enum: [read, write]
  file_type:
    description: The type of file being monitored.
    type: string
    requirement_level: recommended
  lock.mode:
    description: SQL Server lock request mode.
    type: string
    requirement_level: recommended
    enum: [shared, exclusive, update, intent, schema, bulk_update, shared_intent_exclusive]
  lock.resource:
    description: SQL Server lock resource type.
    type: string
    requirement_level: recommended
    enum: [key, page, row, table, extent, file, hobt, metadata, application, allocation_unit, database_level]
  logical_filename:
    description: The logical filename of the file being monitored.
    type: string
    requirement_level: recommended
  member.kind:
    description: Role-membership member breakdown bucket. `high_privilege` covers db_owner, db_securityadmin, db_accessadmin, db_backupoperator, db_ddladmin.
    type: string
    requirement_level: recommended
    enum: [app_role, cross_role, high_privilege, unique]
  membership.kind:
    description: Role-membership grouping bucket.
    type: string
    requirement_level: recommended
    enum: [active, custom, nested, users]
  memory.pool:
    description: The functional area of SQL Server memory.
    type: string
    requirement_level: recommended
    enum: [target, total, sql_cache, optimizer, connection, granted_workspace, max_workspace]
  memory.state:
    description: The state of system memory observed by SQL Server.
    type: string
    requirement_level: recommended
    enum: [available, total]
  network.peer.address:
    description: IP address of the peer client.
    type: string
    requirement_level: recommended
  network.peer.port:
    description: TCP port used by the peer client.
    type: int
    requirement_level: recommended
  page.operations:
    name_override: type
    description: The page operation types.
    type: string
    requirement_level: recommended
    enum: [read, write]
  page.pool:
    description: The type of page pool in the SQL Server buffer manager.
    type: string
    requirement_level: recommended
    enum: [cache, total, target, database, stolen, reserved, free]
  page_file.state:
    description: The state of the database page file (reserved space) allocation.
    type: string
    requirement_level: recommended
    enum: [used, free, total]
  performance_counter.object_name:
    description: Category to which this counter belongs
    type: string
    requirement_level: recommended
  physical_filename:
    description: The physical filename of the file being monitored.
    type: string
    requirement_level: recommended
  principal.type:
    description: Database security principal type.
    type: string
    requirement_level: recommended
    enum: [sql_user, windows_user, role, application_role, certificate_mapped_user, asymmetric_key_mapped_user]
  process.status:
    description: The status of the SQL Server process/session.
    type: string
    requirement_level: recommended
    enum: [background, dormant, preconnect, runnable, running, sleeping, suspended]
  replica.direction:
    description: The direction of flow of bytes for replica.
    type: string
    requirement_level: recommended
    enum: [transmit, receive]
  replica.queue_kind:
    description: Type of AG database-replica queue.
    type: string
    requirement_level: recommended
    enum: [log_send, redo]
  replica.role:
    description: Availability replica role.
    type: string
    requirement_level: recommended
    enum: [primary, secondary, resolving, unknown]
  replica.server_name:
    description: Server name of the availability replica.
    type: string
    requirement_level: recommended
  replica.sync_health:
    description: Synchronization health of the availability replica.
    type: string
    requirement_level: recommended
    enum: [healthy, partially_healthy, not_healthy, unknown]
  role:
    description: The name of the database or server role.
    type: string
    requirement_level: recommended
  role.state:
    description: Database role usage state.
    type: string
    requirement_level: recommended
    enum: [empty, with_members]
  server.address:
    description: The network address of the server hosting the database.
    type: string
    requirement_level: recommended
  server.port:
    description: The port number on which the server is listening.
    type: int
    requirement_level: recommended
  sqlserver.blocking.start_time:
    description: Timestamp of when the current blocking wait began (ISO 8601 format).
    type: string
    requirement_level: recommended
  sqlserver.blocking_session_id:
    description: Session ID that is blocking the current session. 0 if none.
    type: int
    requirement_level: recommended
  sqlserver.client.app.name:
    description: Name of the client application that initiated the session.
    type: string
    requirement_level: recommended
  sqlserver.command:
    description: SQL command type being executed.
    type: string
    requirement_level: recommended
  sqlserver.context_info:
    description: Context information for the session, represented as a hexadecimal string.
    type: string
    requirement_level: recommended
  sqlserver.cpu_time:
    description: CPU time consumed by the query, in seconds.
    type: double
    requirement_level: recommended
  sqlserver.deadlock_priority:
    description: Deadlock priority value for the session.
    type: int
    requirement_level: recommended
  sqlserver.estimated_completion_time:
    description: Estimated time remaining for the request to complete, in seconds.
    type: double
    requirement_level: recommended
  sqlserver.execution_count:
    description: Number of times that the plan has been executed since it was last compiled, reported in delta value.
    type: int
    requirement_level: recommended
  sqlserver.lock_timeout:
    description: Lock timeout value in seconds.
    type: double
    requirement_level: recommended
  sqlserver.logical_reads:
    description: Number of logical reads (data read from cache/memory).
    type: int
    requirement_level: recommended
  sqlserver.open_transaction_count:
    description: Number of transactions currently open in the session.
    type: int
    requirement_level: recommended
  sqlserver.parameterization.result:
    description: The result of an auto-parameterization attempt by the SQL Server query optimizer.
    type: string
    requirement_level: recommended
    enum: [auto_attempted, safe, unsafe, failed, forced]
  sqlserver.percent_complete:
    description: Percentage of work completed.
    type: double
    requirement_level: recommended
  sqlserver.plan.guidance.result:
    description: Whether a SQL plan execution successfully used a matching plan guide (guided) or did not (misguided).
    type: string
    requirement_level: recommended
    enum: [guided, misguided]
  # Stored Procedures
  sqlserver.procedure_execution_count:
    description: Number of times that the procedure has been executed since it was last compiled, reported in delta value.
    type: int
    requirement_level: recommended
  sqlserver.procedure_id:
    description: The SQL Server ID of the stored procedure, if any
    type: string
    requirement_level: recommended
  sqlserver.procedure_name:
    description: The name of the stored procedure, if any
    type: string
    requirement_level: recommended
  sqlserver.query.last_started:
    description: Timestamp of when the SQL query last started executing (ISO 8601 format).
    type: string
    requirement_level: recommended
  sqlserver.query.plan.creation_time:
    description: Timestamp of when the SQL query execution plan was compiled (ISO 8601 format).
    type: string
    requirement_level: recommended
  sqlserver.query_hash:
    description: Binary hash value calculated on the query and used to identify queries with similar logic, reported in the HEX format.
    type: string
    requirement_level: recommended
  sqlserver.query_plan:
    description: The query execution plan used by the SQL Server.
    type: string
    requirement_level: recommended
  sqlserver.query_plan_hash:
    description: Binary hash value calculated on the query execution plan and used to identify similar query execution plans, reported in the HEX format.
    type: string
    requirement_level: recommended
  sqlserver.query_start:
    description: Timestamp of when the SQL query started (ISO 8601 format).
    type: string
    requirement_level: recommended
  sqlserver.reads:
    description: Number of physical reads performed by the query.
    type: int
    requirement_level: recommended
  sqlserver.request_status:
    description: Status of the request (e.g., running, suspended).
    type: string
    requirement_level: recommended
  sqlserver.row_count:
    description: Number of rows affected or returned by the query.
    type: int
    requirement_level: recommended
  sqlserver.session.duration:
    description: Total elapsed time in seconds the session has been actively executing requests.
    type: double
    requirement_level: recommended
  sqlserver.session.start_time:
    description: Timestamp when the session was established (ISO 8601 format).
    type: string
    requirement_level: recommended
  sqlserver.session_id:
    description: ID of the SQL Server session.
    type: int
    requirement_level: recommended
  sqlserver.session_status:
    description: Status of the session (e.g., running, sleeping).
    type: string
    requirement_level: recommended
  sqlserver.total_elapsed_time:
    description: Total elapsed time for completed executions of this plan, reported in delta seconds.
    type: double
    requirement_level: recommended
  ## top query
  sqlserver.total_grant_kb:
    description: The total amount of reserved memory grant in KB this plan received since it was compiled, reported in delta value.
    type: int
    requirement_level: recommended
  sqlserver.total_logical_reads:
    description: Total number of logical reads performed by executions of this plan since it was compiled, reported in delta value.
    type: int
    requirement_level: recommended
  sqlserver.total_logical_writes:
    description: Total number of logical writes performed by executions of this plan since it was compiled, reported in delta value.
    type: int
    requirement_level: recommended
  sqlserver.total_physical_reads:
    description: Total number of physical reads performed by executions of this plan since it was compiled, reported in delta value.
    type: int
    requirement_level: recommended
  sqlserver.total_rows:
    description: Total number of rows returned by the query, reported in delta value.
    type: int
    requirement_level: recommended
  sqlserver.total_worker_time:
    description: Total amount of CPU time that was consumed by executions of this plan since it was compiled, reported in delta seconds.
    type: double
    requirement_level: recommended
  sqlserver.transaction_id:
    description: Unique ID of the active transaction.
    type: int
    requirement_level: recommended
  sqlserver.transaction_isolation_level:
    description: Transaction isolation level used in the session. Represented as numeric constant.
    type: int
    requirement_level: recommended
  sqlserver.wait.resource.id:
    description: SQL Server identifier for the locked or waited-on resource, if available.
    type: string
    requirement_level: recommended
  sqlserver.wait.resource.type:
    description: SQL Server type of the locked or waited-on resource, if available.
    type: string
    requirement_level: recommended
  sqlserver.wait_resource:
    description: The resource for which the session is waiting.
    type: string
    requirement_level: recommended
  sqlserver.wait_time:
    description: Duration in seconds the request has been waiting.
    type: double
    requirement_level: recommended
  sqlserver.wait_type:
    description: Type of wait encountered by the request. Empty if none.
    type: string
    requirement_level: recommended
  sqlserver.writes:
    description: Number of writes performed by the query.
    type: int
    requirement_level: recommended
  table.state:
    description: The state of the table.
    type: string
    requirement_level: recommended
    enum: [active, inactive]
  table.status:
    description: The status of the table.
    type: string
    requirement_level: recommended
    enum: [temporary, permanent]
  task.state:
    description: SQL Server task state for thread-pool diagnostics.
    type: string
    requirement_level: recommended
    enum: [current, queued, waiting_for_threadpool]
  tempdb.file.id:
    description: Numeric file_id within tempdb (sys.master_files.file_id).
    type: int
    requirement_level: recommended
  tempdb.space_kind:
    description: TempDB space usage category.
    type: string
    requirement_level: recommended
    enum: [user_objects, internal_objects, version_store, free]
  tempdb.state:
    description: The status of the tempdb space usage.
    type: string
    requirement_level: recommended
    enum: [free, used]
  transition.direction:
    description: The direction of a superlatch transition.
    type: string
    requirement_level: recommended
    enum: [promotion, demotion]
  user.name:
    description: Login name associated with the SQL Server session.
    type: string
    requirement_level: recommended

  wait.category:
    description: Category of the reason for a wait.
    type: string
    requirement_level: recommended
  wait.type:
    description: Type of the wait, view [WaitTypes documentation](https://learn.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql?view=sql-server-ver16#WaitTypes) for more information.
    type: string
    requirement_level: recommended
  worker.state:
    description: SQL Server worker state.
    type: string
    requirement_level: recommended
    enum: [running, suspended_or_sleeping]
  # attributes for events
  ## common
events:
  db.server.query_sample:
    enabled: false
    description: query sample
    attributes:
      - client.address
      - client.port
      - db.namespace
      - db.query.text
      - db.system.name
      - network.peer.address
      - network.peer.port
      - sqlserver.blocking_session_id
      - sqlserver.blocking.start_time
      - sqlserver.client.app.name
      - sqlserver.context_info
      - sqlserver.command
      - sqlserver.cpu_time
      - sqlserver.deadlock_priority
      - sqlserver.estimated_completion_time
      - sqlserver.lock_timeout
      - sqlserver.logical_reads
      - sqlserver.open_transaction_count
      - sqlserver.percent_complete
      - sqlserver.query_hash
      - sqlserver.query_plan_hash
      - sqlserver.query_start
      - sqlserver.reads
      - sqlserver.request_status
      - sqlserver.wait.resource.id
      - sqlserver.wait.resource.type
      - sqlserver.row_count
      - sqlserver.session.duration
      - sqlserver.session.start_time
      - sqlserver.session_id
      - sqlserver.session_status
      - sqlserver.total_elapsed_time
      - sqlserver.transaction_id
      - sqlserver.transaction_isolation_level
      - sqlserver.wait_resource
      - sqlserver.wait_time
      - sqlserver.wait_type
      - sqlserver.writes
      - user.name
      - sqlserver.procedure_id
      - sqlserver.procedure_name
      - db.query.full_text
      - db.query.comment_tags.nr_service_guid
      - db.query.text.normalized.hash

  db.server.top_query:
    enabled: false
    description: top query
    attributes:
      - sqlserver.total_worker_time
      - db.query.text
      - db.namespace
      - sqlserver.execution_count
      - sqlserver.total_logical_reads
      - sqlserver.total_logical_writes
      - sqlserver.total_physical_reads
      - sqlserver.query_hash
      - sqlserver.query_plan
      - sqlserver.query_plan_hash
      - sqlserver.total_rows
      - sqlserver.total_elapsed_time
      - sqlserver.total_grant_kb
      - server.address
      - server.port
      - db.system.name
      - sqlserver.procedure_execution_count
      - sqlserver.procedure_id
      - sqlserver.procedure_name
      - sqlserver.query.last_started
      - sqlserver.query.plan.creation_time
      - db.query.full_text
      - db.query.comment_tags.nr_service_guid
      - db.query.text.normalized.hash

metrics:
  sqlserver.attention.rate:
    enabled: false
    description: Number of SQL attentions (client cancellation interrupts) received per second.
    stability: development
    unit: "{attentions}/s"
    gauge:
      value_type: double
    attributes: []
  sqlserver.batch.compilation.utilization:
    enabled: false
    description: Number of SQL compilations per batch request.
    stability: development
    unit: "1"
    gauge:
      value_type: double
    attributes: []
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.batch.page_split.utilization:
    enabled: false
    description: Number of page splits per batch request.
    stability: development
    unit: "1"
    gauge:
      value_type: double
    attributes: []
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.batch.request.rate:
    enabled: true
    description: Number of batch requests received by SQL Server.
    stability: development
    unit: "{requests}/s"
    gauge:
      value_type: double
  sqlserver.batch.sql_compilation.rate:
    enabled: true
    description: Number of SQL compilations needed.
    stability: development
    unit: "{compilations}/s"
    gauge:
      value_type: double
  sqlserver.batch.sql_recompilation.rate:
    enabled: true
    description: Number of SQL recompilations needed.
    stability: development
    unit: "{compilations}/s"
    gauge:
      value_type: double
  sqlserver.computer.uptime:
    enabled: false
    description: Computer uptime.
    stability: development
    unit: "{seconds}"
    gauge:
      value_type: int
      input_type: string
  sqlserver.cpu.count:
    enabled: false
    description: Number of CPUs.
    stability: development
    unit: "{CPUs}"
    gauge:
      value_type: int
      input_type: string
  sqlserver.database.backup_or_restore.rate:
    enabled: false
    description: Total number of backups/restores.
    stability: development
    unit: "{backups_or_restores}/s"
    gauge:
      value_type: double
    attributes: []
  sqlserver.database.count:
    enabled: false
    description: The number of databases
    stability: development
    unit: "{databases}"
    gauge:
      value_type: int
      input_type: string
    attributes: [database.status]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.execution.errors:
    enabled: false
    description: Number of execution errors.
    stability: development
    unit: "{errors}"
    gauge:
      value_type: int
    attributes: []
  sqlserver.database.file.size:
    enabled: false
    description: Size of database files.
    stability: development
    unit: By
    gauge:
      value_type: int
      input_type: string
    attributes: [file_type, db.namespace]
    extended_documentation: Storage consumed by database files, broken down by file type (data or log). Essential for capacity planning and growth tracking. The db.namespace attribute contains the database name. The file_type attribute indicates whether this is a data file or log file. Available on all SQL Server editions (2012+).
  sqlserver.database.full_scan.rate:
    enabled: false
    description: The number of unrestricted full table or index scans.
    stability: development
    unit: "{scans}/s"
    gauge:
      value_type: double
    attributes: []
  sqlserver.database.io:
    enabled: false
    description: The number of bytes of I/O on this file.
    stability: development
    unit: "By"
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
      input_type: string
    attributes: [physical_filename, logical_filename, file_type, direction]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.latency:
    enabled: false
    description: Total time that the users waited for I/O issued on this file.
    stability: development
    unit: "s"
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: double
    attributes: [physical_filename, logical_filename, file_type, direction]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.operations:
    enabled: false
    description: The number of operations issued on the file.
    stability: development
    unit: "{operations}"
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
      input_type: string
    attributes: [physical_filename, logical_filename, file_type, direction]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.page_file.size:
    enabled: false
    description: Reserved space allocated to the database, broken down by usage state.
    stability: development
    unit: By
    gauge:
      value_type: int
      input_type: string
    attributes: [db.namespace, page_file.state]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.principals.count:
    enabled: false
    description: Number of database security principals broken down by type.
    stability: development
    unit: "{principals}"
    gauge:
      value_type: int
      input_type: string
    attributes: [db.namespace, principal.type]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.principals.old:
    enabled: false
    description: Number of database principals created more than one year ago.
    stability: development
    unit: "{principals}"
    gauge:
      value_type: int
      input_type: string
    attributes: [db.namespace]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.principals.orphaned_users:
    enabled: false
    description: Number of SQL users in the database that have no matching server login.
    stability: development
    unit: "{principals}"
    gauge:
      value_type: int
      input_type: string
    attributes: [db.namespace]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.principals.recently_created:
    enabled: false
    description: Number of database principals created in the last 30 days.
    stability: development
    unit: "{principals}"
    gauge:
      value_type: int
      input_type: string
    attributes: [db.namespace]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.role.members.count:
    enabled: false
    description: Number of database role members broken down by member kind.
    stability: development
    unit: "{members}"
    gauge:
      value_type: int
      input_type: string
    attributes: [db.namespace, member.kind]
    extended_documentation: This metric is only available when the receiver is configured to directly connect to SQL Server.
  sqlserver.database.role.memberships.count:
    enabled: false
    description: Number of database role memberships broken down by kind.
    stability: development
    unit: "{memberships}"
    gauge:
      value_type: int
      input_type: string
    attributes: [db.namespace, membership.kind]
