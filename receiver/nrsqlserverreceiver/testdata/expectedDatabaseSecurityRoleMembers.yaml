resourceMetrics:
  - resource:
      attributes:
        - key: host.name
          value:
            stringValue: 0.0.0.0
        - key: server.address
          value:
            stringValue: 0.0.0.0
        - key: server.port
          value:
            intValue: "1433"
        - key: service.instance.id
          value:
            stringValue: 0.0.0.0:1433
        - key: service.name
          value:
            stringValue: unknown_service:microsoft.sql_server
        - key: service.namespace
          value:
            stringValue: ""
        - key: sqlserver.database.name
          value:
            stringValue: productiondb
        - key: sqlserver.instance.name
          value:
            stringValue: SERVER1
    scopeMetrics:
      - metrics:
          - description: Number of members in a database role.
            gauge:
              dataPoints:
                - asInt: "1"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: productiondb
                    - key: role
                      value:
                        stringValue: db_owner
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.database.security.role_membership.count
            unit: '{members}'
        scope:
          name: github.com/newrelic-forks/opentelemetry-collector-contrib/receiver/nrsqlserverreceiver
          version: latest
