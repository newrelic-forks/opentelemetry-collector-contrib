include_fragments = false

accept = ["200..=299", "429"]

exclude  = [
    "^http(s)?://localhost",
    "^http(s)?://example.com",
    "^https://dev.mysql.com",
    "^https://bugs.mysql.com",
    "^https://techdocs.akamai.com",
    "^https://www.vultr.com",
    "^https://docs.honeycomb.io",
    # Private GitHub teams (e.g. @newrelic/dbi referenced in CODEOWNERS-driven READMEs)
    # return 404 to unauthenticated lychee fetches.
    "^https?://(www\\.)?github\\.com/newrelic/dbi"
]

# better to be safe and avoid failures
max_retries = 6
